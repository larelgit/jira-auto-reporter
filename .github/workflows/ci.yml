# ============================================================
#  CI Pipeline — Lint, Syntax Check, Unit Tests
#  Triggers: push to main, any pull request
# ============================================================
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint:
    name: 🔍 Lint & Style
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: ⬇️ Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 ruff

      - name: 🔎 Flake8 — check style
        run: |
          flake8 . \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics
          # Full check (warnings only)
          flake8 . \
            --count \
            --exit-zero \
            --max-complexity=10 \
            --max-line-length=120 \
            --statistics

      - name: ⚡ Ruff — fast linter
        run: |
          ruff check . --output-format=github || true

  syntax-check:
    name: 🧪 Syntax & Import Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ⬇️ Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔧 Compile all .py files (syntax check)
        run: |
          python -m py_compile config.py
          python -m py_compile jira_client.py
          python -m py_compile jira_reporter.py
          echo "✅ All files compiled successfully"

      - name: 📋 Check imports resolve
        run: |
          python -c "from config import JiraConfig; print('✅ config.py imports OK')" || true
          python -c "from jira_client import JiraClient, Colors; print('✅ jira_client.py imports OK')"

  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: [syntax-check]

    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: ⬇️ Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: 🧪 Run tests
        env:
          # Fake env vars so config doesn't crash during import
          JIRA_DOMAIN: "fake-ci.atlassian.net"
          JIRA_EMAIL: "ci@example.com"
          JIRA_API_TOKEN: "fake-token-for-ci"
          JIRA_PROJECT_KEY: "TEST"
        run: |
          pytest tests/ -v --tb=short

  all-checks:
    name: ✅ All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint, syntax-check, test]
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.syntax-check.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Some checks failed!"
            exit 1
          fi
          echo "✅ All checks passed!"
